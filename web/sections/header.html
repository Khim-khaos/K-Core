<div class="header" id="main-header">
    <div class="header-left">
        <button class="dark-btn icon-only menu-btn" onclick="KubekUI.toggleSidebar()" aria-label="Menu">
            <span class="material-symbols-rounded">menu</span>
        </button>
        <div class="logo" onclick="window.location='/'">
            <img src="/assets/kubek_icon.png" alt="Kubek"/>
            <img src="/assets/kubek_logo_text.svg" alt="Kubek" class="logo-text"/>
        </div>
    </div>

    <div class="header-center">
        <span class="header-title">Kubek</span>
        <span class="header-version" id="header-version"></span>
    </div>

    <div class="header-right">
        <button class="dark-btn icon-only header-icon-btn" id="header-refresh-btn" title="Refresh" aria-label="Refresh">
            <span class="material-symbols-rounded">refresh</span>
        </button>
        <div class="account" id="account-btn">
            <div class="bg-circle">
                <span class="material-symbols-rounded">person</span>
            </div>
            <span class="login"></span>
            <span class="material-symbols-rounded account-chevron">expand_more</span>
        </div>
    </div>
</div>

<script defer>
    $(function () {
        KubekRequests.get("/kubek/version", (ver) => {
            if (ver) {
                document.getElementById("header-version").textContent = "v" + (typeof ver === "string" ? ver : ver.version || "");
            }
        });

        KubekRequests.get("/auth/isEnabled", (isAuth) => {
            if (isAuth === false) {
                $(".header .account").hide();
            } else {
                KubekRequests.get("/auth/login", (login) => {
                    $(".header .account .login").text(login);
                });
            }
        });

        $("#account-btn").on("click", (e) => {
            const items = [{
                icon: "logout",
                text: "{{commons.logout}}",
                data: "logout"
            }];
            KubekDropdowns.addDropdown(items, e.clientX, e.clientY, 5, (result) => {
                if (result === "logout") {
                    KubekRequests.get("/auth/logout", () => {
                        window.location = "/login.html";
                    });
                }
            });
        });

        $("#header-refresh-btn").on("click", function() {
            const icon = this.querySelector(".material-symbols-rounded");
            if (icon) {
                icon.classList.add("animate-spin");
                setTimeout(() => icon.classList.remove("animate-spin"), 700);
            }
            if (typeof KubekRefresher !== "undefined") {
                KubekRefresher.refreshConsoleLog?.();
                KubekRefresher.refreshServerHeader?.();
            }
        });
    });
</script>
